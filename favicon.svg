<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="102" fill="#1c183a"/>
  <!-- Origin dot (gold/amber) -->
  <circle cx="175" cy="108" r="16" fill="#d4a44a"/>
  <!-- Winding path (cream) - gentle vertical meander -->
  <path d="M 175 108
           C 185 95, 250 85, 300 120
           C 350 155, 310 210, 255 240
           C 200 270, 195 310, 225 350
           C 255 390, 310 395, 335 388"
